<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Werkzeug – Heesch SHK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#111; --surface:#1c1c1c; --surface2:#252525; --border:#2e2e2e;
  --red:#CC0000; --red2:#991000; --green:#2a6e2e; --green2:#3dba44;
  --orange:#b36200; --orange2:#ff9a2e; --blue:#1a4a8a; --blue2:#4a9eff;
  --text:#f0ede8; --muted:#777;
  --sans:'Barlow',sans-serif; --mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#2a0000 0%,#111 60%);}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:8px;}
.login-logo h1{font-size:22px;font-weight:700;display:inline;}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.login-title{font-size:16px;font-weight:600;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;font-family:var(--mono);}
.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--red);}
.fg input::placeholder{color:var(--muted);}
.fg select option{background:var(--surface2);}
.btn-p{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;margin-top:6px;}
.btn-p:hover{background:var(--red2);}
.admin-link{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
.admin-link button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;font-family:var(--sans);}
.login-err{background:#3a1010;border:1px solid var(--red2);border-radius:6px;padding:8px 12px;font-size:13px;color:#ff8080;margin-bottom:12px;display:none;}

/* TOPBAR */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.btn-sm:hover{color:var(--text);border-color:#555;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
.sync-dot.live{background:var(--green2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.user-tag{font-size:12px;color:var(--muted);font-family:var(--mono);padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.nav-tab{flex:1;padding:12px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--sans);border-bottom:2px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--red);}

/* WERKZEUG PANEL */
.main-layout{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
@media(max-width:680px){.main-layout{grid-template-columns:1fr;}}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border);height:calc(100vh - 105px);overflow:hidden;}
.panel:last-child{border-right:none;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:8px;}
.panel-count{background:var(--surface2);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--muted);}
.panel-body{flex:1;overflow-y:auto;padding:12px;}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:var(--sans);}
.search-inp:focus{border-color:var(--red);}
.search-inp::placeholder{color:var(--muted);}
.kat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);padding:8px 4px 4px;}
.wz-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:all .15s;cursor:pointer;}
.wz-card:hover{border-color:#3a3a3a;background:var(--surface2);}
.wz-icon{width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.wz-info{flex:1;min-width:0;}
.wz-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wz-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.wz-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:var(--sans);white-space:nowrap;transition:background .15s;}
.wz-btn:hover{background:var(--red2);}
.wz-btn.gruen{background:var(--green);}
.wz-btn.gruen:hover{background:#1e5522;}
.kfz-section{margin-bottom:16px;}
.kfz-header{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;}
.kfz-plate{font-family:var(--mono);font-size:13px;font-weight:500;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;color:var(--text);letter-spacing:.06em;}
.kfz-monteur{font-size:13px;font-weight:600;flex:1;}
.kfz-anzahl{font-size:11px;font-family:var(--mono);color:var(--muted);}
.kfz-werkzeug{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:4px;background:#0d1f0e;border:1px solid var(--green);}
.kfz-wz-name{font-size:13px;flex:1;}
.kfz-wz-meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.btn-zurueck{background:transparent;border:1px solid #3a1010;color:#cc4444;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap;}
.btn-zurueck:hover{background:#3a1010;}
.empty-panel{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;}
.empty-panel .ei{font-size:36px;margin-bottom:10px;}

/* STATUS BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap;font-weight:600;letter-spacing:.03em;}
.badge-auto{background:#0d1f0e;color:var(--green2);border:1px solid var(--green);}
.badge-frei{background:#1a2a1a;color:#7bc87f;border:1px solid #2a5a2e;}
.badge-wartung{background:#2a1f00;color:var(--orange2);border:1px solid var(--orange);}
.badge-defekt{background:#3a1010;color:#ff8080;border:1px solid #5a1a1a;}

/* MASCHINEN PANEL */
.maschine-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
.maschine-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.maschine-icon{font-size:22px;}
.maschine-name{font-size:14px;font-weight:700;flex:1;}
.maschine-body{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.maschine-meta{font-size:11px;color:var(--muted);font-family:var(--mono);flex:1;}
.maschine-auto{font-size:12px;font-weight:600;}
.maschine-auto.keins{color:var(--muted);font-style:italic;}

/* ADMIN */
#adminScreen{background:var(--bg);}
.admin-body{padding:20px;max-width:700px;margin:0 auto;}
.admin-section{margin-bottom:28px;}
.admin-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.form-row .fg{flex:1;min-width:130px;margin-bottom:0;}
.btn-add{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;}
.btn-add:hover{background:#1e5522;}
.admin-wz-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;}
.admin-wz-info{flex:1;}
.admin-wz-name{font-size:13px;font-weight:600;}
.admin-wz-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.btn-del{background:transparent;border:1px solid #3a1010;color:#cc4444;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.btn-del:hover{background:#3a1010;}
.admin-tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);}
.admin-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans);}
.admin-tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);}

/* Status Select */
.status-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:var(--mono);cursor:pointer;outline:none;}
.status-select:focus{border-color:var(--red);}
.status-select option{background:var(--surface2);}

/* Maschinen Admin Item */
.admin-maschine-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;flex-wrap:wrap;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div><span class="dot"></span><h1>Heesch SHK</h1></div>
      <p>WERKZEUG & MASCHINENVERWALTUNG</p>
    </div>
    <div id="loginErr" class="login-err"></div>
    <div id="monteurForm">
      <div class="login-title">Monteur anmelden</div>
      <div class="fg"><label>Vollständiger Name</label><input type="text" id="inputName" placeholder="z.B. Klaus Müller" autocomplete="off"></div>
      <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="inputKfz" placeholder="z.B. IZ-KL 123" style="text-transform:uppercase" autocomplete="off"></div>
      <button class="btn-p" onclick="monteurLogin()">Anmelden</button>
      <div class="admin-link"><button onclick="showAdmin()">Admin-Bereich</button></div>
    </div>
    <div id="adminForm" style="display:none">
      <div class="login-title">Admin-Anmeldung</div>
      <div class="fg"><label>Passwort</label><input type="password" id="inputPw" placeholder="••••••••"></div>
      <button class="btn-p" onclick="adminLogin()">Einloggen</button>
      <div class="admin-link"><button onclick="showMonteur()">← Zurück</button></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Heesch SHK</span></div>
    <div class="topbar-right">
      <span id="syncDot" class="sync-dot"></span>
      <div class="user-tag" id="userTag">–</div>
      <button class="btn-sm" onclick="abmelden()">Abmelden</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="mainTab(this,'tabWerkzeuge')">🔧 Werkzeug</button>
    <button class="nav-tab" onclick="mainTab(this,'tabMaschinen')">⚙️ Maschinen</button>
  </div>

  <!-- WERKZEUG TAB -->
  <div id="tabWerkzeuge" class="main-layout">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🏭 Lager – Verfügbar <span class="panel-count" id="lagerCount">0</span></span>
      </div>
      <div class="search-wrap"><input type="text" class="search-inp" id="searchLager" placeholder="Suchen..." oninput="renderLager()"></div>
      <div class="panel-body" id="lagerPanel"><div class="empty-panel"><div class="ei">⏳</div>Lade...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🚐 Im Fahrzeug <span class="panel-count" id="kfzCount">0</span></span>
      </div>
      <div class="panel-body" id="kfzPanel"><div class="empty-panel"><div class="ei">⏳</div>Lade...</div></div>
    </div>
  </div>

  <!-- MASCHINEN TAB -->
  <div id="tabMaschinen" style="display:none;flex:1;overflow-y:auto;padding:16px;">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;" id="maschinenGrid">
      <div class="empty-panel"><div class="ei">⏳</div>Lade...</div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Admin</span></div>
    <div class="topbar-right">
      <span id="syncDotAdmin" class="sync-dot"></span>
      <button class="btn-sm" onclick="adminAbmelden()">Abmelden</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="adminTab(this,'tw')">Werkzeuge</button>
    <button class="admin-tab" onclick="adminTab(this,'tm')">Maschinen</button>
    <button class="admin-tab" onclick="adminTab(this,'ta')">Autos</button>
    <button class="admin-tab" onclick="adminTab(this,'to')">Übersicht</button>
  </div>
  <div class="admin-body">

    <!-- Werkzeuge -->
    <div id="tw">
      <div class="admin-section">
        <div class="admin-section-title">Werkzeug hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Name</label><input type="text" id="addWzName" placeholder="z.B. Schlagbohrmaschine"></div>
            <div class="fg"><label>Kategorie</label><input type="text" id="addWzKat" placeholder="z.B. Elektrowerkzeug"></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Seriennummer</label><input type="text" id="addWzSerial" placeholder="z.B. SN-2024-001"></div>
            <div class="fg"><label>Symbol (Emoji)</label><input type="text" id="addWzEmoji" placeholder="🔧" maxlength="2"></div>
          </div>
          <button class="btn-add" onclick="wzHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Werkzeuge (<span id="adminWzCount">0</span>)</div>
        <div id="adminWzListe"></div>
      </div>
    </div>

    <!-- Maschinen -->
    <div id="tm" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Maschine hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Name</label><input type="text" id="addMaName" placeholder="z.B. Viessmann Vitodens 200"></div>
            <div class="fg"><label>Typ / Kategorie</label><input type="text" id="addMaTyp" placeholder="z.B. Heizung"></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Seriennummer</label><input type="text" id="addMaSerial" placeholder="z.B. SN-HZ-001"></div>
            <div class="fg"><label>Symbol (Emoji)</label><input type="text" id="addMaEmoji" placeholder="⚙️" maxlength="2"></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Zugeordnetes Auto (KFZ)</label>
              <select id="addMaAuto"><option value="">– kein Auto –</option></select>
            </div>
          </div>
          <button class="btn-add" onclick="maHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Maschinen (<span id="adminMaCount">0</span>)</div>
        <div id="adminMaListe"></div>
      </div>
    </div>

    <!-- Autos -->
    <div id="ta" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Auto hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="addAutoKfz" placeholder="z.B. IZ-HH 123" style="text-transform:uppercase"></div>
            <div class="fg"><label>Beschreibung</label><input type="text" id="addAutoDesc" placeholder="z.B. Weißer Sprinter"></div>
          </div>
          <button class="btn-add" onclick="autoHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Autos (<span id="adminAutoCount">0</span>)</div>
        <div id="adminAutoListe"></div>
      </div>
    </div>

    <!-- Übersicht -->
    <div id="to" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Gesamtübersicht</div>
        <div id="adminUebersicht"></div>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyByjMOVQ12Grua48QwGGvvnB4lze-isyv0",
  authDomain: "shk-todo-da35b.firebaseapp.com",
  projectId: "shk-todo-da35b",
  storageBucket: "shk-todo-da35b.firebasestorage.app",
  messagingSenderId: "978821411452",
  appId: "1:978821411452:web:3a295d420ad277130d4ff9"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const ADMIN_PW = "Heesch2000!";

let werkzeuge = [], auswahlen = {}, maschinen = [], autos = [];
let currentUser = null;

const STATUS_LABELS = { auto:'Im Auto', frei:'Frei', wartung:'Zur Wartung', defekt:'Defekt' };
const STATUS_BADGE  = { auto:'badge-auto', frei:'badge-frei', wartung:'badge-wartung', defekt:'badge-defekt' };

function sync(id) { const d=document.getElementById(id); if(d){d.className='sync-dot live';} }

// LISTENERS
const qWZ = query(collection(db,'werkzeuge'), orderBy('kategorie'), orderBy('name'));
onSnapshot(qWZ, snap => {
  werkzeuge = snap.docs.map(d=>({id:d.id,...d.data()}));
  sync('syncDot'); sync('syncDotAdmin');
  renderLager(); renderKfz(); renderAdminWz();
});

onSnapshot(collection(db,'auswahlen'), snap => {
  auswahlen = {};
  snap.docs.forEach(d=>{auswahlen[d.id]=d.data();});
  renderLager(); renderKfz(); renderAdminUebersicht();
});

const qMA = query(collection(db,'maschinen'), orderBy('typ'), orderBy('name'));
onSnapshot(qMA, snap => {
  maschinen = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMaschinen(); renderAdminMa(); updateAutoSelects();
}, () => {
  // fallback without ordering if index not ready
  onSnapshot(collection(db,'maschinen'), snap => {
    maschinen = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderMaschinen(); renderAdminMa(); updateAutoSelects();
  });
});

onSnapshot(collection(db,'autos'), snap => {
  autos = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.kfz.localeCompare(b.kfz));
  renderAdminAutos(); updateAutoSelects();
});

// LOGIN
window.showAdmin   = ()=>{ document.getElementById('monteurForm').style.display='none'; document.getElementById('adminForm').style.display='block'; loginErr(''); };
window.showMonteur = ()=>{ document.getElementById('adminForm').style.display='none'; document.getElementById('monteurForm').style.display='block'; loginErr(''); };
function loginErr(msg){ const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display=msg?'block':'none'; }

window.monteurLogin = ()=>{
  const name=document.getElementById('inputName').value.trim();
  const kfz=document.getElementById('inputKfz').value.trim().toUpperCase();
  if(!name){loginErr('Bitte Namen eingeben.');return;}
  if(!kfz){loginErr('Bitte KFZ-Kennzeichen eingeben.');return;}
  currentUser={name,kfz};
  document.getElementById('userTag').textContent=name+' · '+kfz;
  showScreen('mainScreen');
};
window.adminLogin = ()=>{
  if(document.getElementById('inputPw').value!==ADMIN_PW){loginErr('Falsches Passwort.');return;}
  showScreen('adminScreen');
};
window.abmelden = ()=>{ currentUser=null; showScreen('loginScreen'); document.getElementById('inputName').value=''; document.getElementById('inputKfz').value=''; };
window.adminAbmelden = ()=>{ document.getElementById('inputPw').value=''; showScreen('loginScreen'); };

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// MAIN TABS
window.mainTab = (btn, tab)=>{
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.getElementById('tabWerkzeuge').style.display = tab==='tabWerkzeuge'?'grid':'none';
  document.getElementById('tabMaschinen').style.display = tab==='tabMaschinen'?'block':'none';
};

// RENDER LAGER
window.renderLager = ()=>{
  const panel=document.getElementById('lagerPanel');
  const search=(document.getElementById('searchLager')?.value||'').toLowerCase();
  const freie=werkzeuge.filter(w=>!auswahlen[w.id]&&(!search||w.name.toLowerCase().includes(search)||w.kategorie.toLowerCase().includes(search)||(w.serial||'').toLowerCase().includes(search)));
  document.getElementById('lagerCount').textContent=freie.length;
  if(!freie.length){ panel.innerHTML=`<div class="empty-panel"><div class="ei">✅</div>Alle Werkzeuge vergeben</div>`; return; }
  const gruppen={};
  freie.forEach(w=>{if(!gruppen[w.kategorie])gruppen[w.kategorie]=[];gruppen[w.kategorie].push(w);});
  panel.innerHTML=Object.entries(gruppen).map(([kat,items])=>`
    <div class="kat-label">${kat}</div>
    ${items.map(w=>`<div class="wz-card" onclick="mitnehmen('${w.id}','${w.name}')">
      <div class="wz-icon">${w.emoji||'🔧'}</div>
      <div class="wz-info"><div class="wz-name">${w.name}</div><div class="wz-meta">${w.serial?'SN: '+w.serial:'–'}</div></div>
      <button class="wz-btn" onclick="event.stopPropagation();mitnehmen('${w.id}','${w.name}')">Mitnehmen →</button>
    </div>`).join('')}
  `).join('');
};

// RENDER KFZ
window.renderKfz = ()=>{
  const panel=document.getElementById('kfzPanel');
  const total=Object.keys(auswahlen).length;
  document.getElementById('kfzCount').textContent=total;
  if(!total){ panel.innerHTML=`<div class="empty-panel"><div class="ei">🔧</div>Noch kein Werkzeug vergeben</div>`; return; }
  const kfzMap={};
  Object.entries(auswahlen).forEach(([wzId,data])=>{
    const key=data.kfz+'||'+data.name;
    if(!kfzMap[key])kfzMap[key]={name:data.name,kfz:data.kfz,items:[]};
    const wz=werkzeuge.find(w=>w.id===wzId);
    if(wz)kfzMap[key].items.push({...wz,wzId});
  });
  const sorted=Object.values(kfzMap).sort((a,b)=>{
    if(currentUser&&a.kfz===currentUser.kfz&&a.name===currentUser.name)return -1;
    if(currentUser&&b.kfz===currentUser.kfz&&b.name===currentUser.name)return 1;
    return a.kfz.localeCompare(b.kfz);
  });
  panel.innerHTML=sorted.map(kfz=>{
    const istMeins=currentUser&&kfz.kfz===currentUser.kfz&&kfz.name===currentUser.name;
    return `<div class="kfz-section">
      <div class="kfz-header">
        <span class="kfz-plate">${kfz.kfz}</span>
        <span class="kfz-monteur">${kfz.name}${istMeins?' <span style="font-size:10px;color:var(--green2)">(Ich)</span>':''}</span>
        <span class="kfz-anzahl">${kfz.items.length} Stk</span>
      </div>
      ${kfz.items.map(w=>`<div class="kfz-werkzeug">
        <span style="font-size:16px">${w.emoji||'🔧'}</span>
        <div style="flex:1;min-width:0"><div class="kfz-wz-name">${w.name}</div><div class="kfz-wz-meta">${w.serial?'SN: '+w.serial:'–'}</div></div>
        ${istMeins?`<button class="btn-zurueck" onclick="zurueckLegen('${w.wzId}','${w.name}')">← Zurück</button>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
};

// RENDER MASCHINEN
window.renderMaschinen = ()=>{
  const grid=document.getElementById('maschinenGrid');
  if(!grid)return;
  if(!maschinen.length){ grid.innerHTML=`<div class="empty-panel"><div class="ei">⚙️</div>Noch keine Maschinen erfasst</div>`; return; }
  grid.innerHTML=maschinen.map(m=>{
    const status=m.status||'frei';
    const autoLabel=m.autoKfz?`<span class="maschine-auto">${m.autoKfz}</span>`:`<span class="maschine-auto keins">Kein Auto</span>`;
    return `<div class="maschine-card">
      <div class="maschine-header">
        <span class="maschine-icon">${m.emoji||'⚙️'}</span>
        <span class="maschine-name">${m.name}</span>
        <span class="badge ${STATUS_BADGE[status]}">${STATUS_LABELS[status]}</span>
      </div>
      <div class="maschine-body">
        <div class="maschine-meta">${m.typ||''}${m.serial?' · SN: '+m.serial:''}</div>
        ${autoLabel}
      </div>
    </div>`;
  }).join('');
};

// WERKZEUG AKTIONEN
window.mitnehmen = async (wzId, wzName)=>{
  if(!currentUser)return;
  if(!confirm('"'+wzName+'" mitnehmen?\nWird Fahrzeug '+currentUser.kfz+' zugeordnet.'))return;
  await setDoc(doc(db,'auswahlen',wzId),{name:currentUser.name,kfz:currentUser.kfz,ts:new Date().toISOString()});
};
window.zurueckLegen = async (wzId, wzName)=>{
  if(!confirm('"'+wzName+'" zurück ins Lager?'))return;
  await deleteDoc(doc(db,'auswahlen',wzId));
};

// ADMIN WERKZEUG
window.wzHinzu = async ()=>{
  const name=document.getElementById('addWzName').value.trim();
  const kat=document.getElementById('addWzKat').value.trim();
  const serial=document.getElementById('addWzSerial').value.trim();
  const emoji=document.getElementById('addWzEmoji').value.trim()||'🔧';
  if(!name||!kat){alert('Name und Kategorie sind Pflichtfelder.');return;}
  await addDoc(collection(db,'werkzeuge'),{name,kategorie:kat,serial:serial||'',emoji});
  document.getElementById('addWzName').value='';
  document.getElementById('addWzSerial').value='';
  document.getElementById('addWzEmoji').value='';
};
window.wzLoeschen = async (id, btn)=>{
  const name=btn?btn.closest('.admin-wz-item').querySelector('.admin-wz-name').textContent:'?';
  if(!confirm('Werkzeug "'+name+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'werkzeuge',id));
  await deleteDoc(doc(db,'auswahlen',id)).catch(()=>{});
};
window.renderAdminWz = ()=>{
  const liste=document.getElementById('adminWzListe'); if(!liste)return;
  document.getElementById('adminWzCount').textContent=werkzeuge.length;
  if(!werkzeuge.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Werkzeuge.</div>';return;}
  liste.innerHTML=werkzeuge.map(w=>`<div class="admin-wz-item">
    <span style="font-size:20px">${w.emoji||'🔧'}</span>
    <div class="admin-wz-info"><div class="admin-wz-name">${w.name}</div><div class="admin-wz-meta">${w.kategorie}${w.serial?' · SN: '+w.serial:''}</div></div>
    ${auswahlen[w.id]?`<span style="font-size:11px;color:#ff8080;font-family:var(--mono)">${auswahlen[w.id].kfz}</span>`:''}
    <button class="btn-del" onclick="wzLoeschen('${w.id}',this)">Löschen</button>
  </div>`).join('');
};

// ADMIN MASCHINEN
window.maHinzu = async ()=>{
  const name=document.getElementById('addMaName').value.trim();
  const typ=document.getElementById('addMaTyp').value.trim();
  const serial=document.getElementById('addMaSerial').value.trim();
  const emoji=document.getElementById('addMaEmoji').value.trim()||'⚙️';
  const autoKfz=document.getElementById('addMaAuto').value;
  if(!name||!typ){alert('Name und Typ sind Pflichtfelder.');return;}
  await addDoc(collection(db,'maschinen'),{name,typ,serial:serial||'',emoji,autoKfz:autoKfz||'',status:'frei'});
  document.getElementById('addMaName').value='';
  document.getElementById('addMaSerial').value='';
  document.getElementById('addMaEmoji').value='';
};
window.maStatusAendern = async (id, newStatus)=>{
  await updateDoc(doc(db,'maschinen',id),{status:newStatus});
};
window.maAutoAendern = async (id, newKfz)=>{
  await updateDoc(doc(db,'maschinen',id),{autoKfz:newKfz});
};
window.maLoeschen = async (id, btn)=>{
  const name=btn?btn.closest('.admin-maschine-item').querySelector('.admin-wz-name').textContent:'?';
  if(!confirm('Maschine "'+name+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'maschinen',id));
};
window.renderAdminMa = ()=>{
  const liste=document.getElementById('adminMaListe'); if(!liste)return;
  document.getElementById('adminMaCount').textContent=maschinen.length;
  if(!maschinen.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Maschinen.</div>';return;}
  liste.innerHTML=maschinen.map(m=>{
    const status=m.status||'frei';
    const autoOptions=autos.map(a=>`<option value="${a.kfz}" ${m.autoKfz===a.kfz?'selected':''}>${a.kfz}${a.desc?' – '+a.desc:''}</option>`).join('');
    return `<div class="admin-maschine-item">
      <span style="font-size:20px">${m.emoji||'⚙️'}</span>
      <div class="admin-wz-info" style="flex:1">
        <div class="admin-wz-name">${m.name}</div>
        <div class="admin-wz-meta">${m.typ}${m.serial?' · SN: '+m.serial:''}</div>
      </div>
      <select class="status-select" onchange="maStatusAendern('${m.id}',this.value)">
        <option value="auto" ${status==='auto'?'selected':''}>Im Auto</option>
        <option value="frei" ${status==='frei'?'selected':''}>Frei</option>
        <option value="wartung" ${status==='wartung'?'selected':''}>Zur Wartung</option>
        <option value="defekt" ${status==='defekt'?'selected':''}>Defekt</option>
      </select>
      <select class="status-select" onchange="maAutoAendern('${m.id}',this.value)" style="min-width:110px">
        <option value="">– kein Auto –</option>
        ${autoOptions}
      </select>
      <button class="btn-del" onclick="maLoeschen('${m.id}',this)">Löschen</button>
    </div>`;
  }).join('');
};

// ADMIN AUTOS
window.autoHinzu = async ()=>{
  const kfz=document.getElementById('addAutoKfz').value.trim().toUpperCase();
  const desc=document.getElementById('addAutoDesc').value.trim();
  if(!kfz){alert('KFZ-Kennzeichen ist Pflichtfeld.');return;}
  await addDoc(collection(db,'autos'),{kfz,desc:desc||''});
  document.getElementById('addAutoKfz').value='';
  document.getElementById('addAutoDesc').value='';
};
window.autoLoeschen = async (id, btn)=>{
  const kfz=btn?btn.closest('.admin-wz-item').querySelector('.admin-wz-name').textContent:'?';
  if(!confirm('Auto "'+kfz+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'autos',id));
};
window.renderAdminAutos = ()=>{
  const liste=document.getElementById('adminAutoListe'); if(!liste)return;
  document.getElementById('adminAutoCount').textContent=autos.length;
  if(!autos.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Autos.</div>';return;}
  liste.innerHTML=autos.map(a=>`<div class="admin-wz-item">
    <span style="font-size:20px">🚐</span>
    <div class="admin-wz-info">
      <div class="admin-wz-name">${a.kfz}</div>
      <div class="admin-wz-meta">${a.desc||'–'}</div>
    </div>
    <button class="btn-del" onclick="autoLoeschen('${a.id}',this)">Löschen</button>
  </div>`).join('');
};
function updateAutoSelects(){
  const opts='<option value="">– kein Auto –</option>'+autos.map(a=>`<option value="${a.kfz}">${a.kfz}${a.desc?' – '+a.desc:''}</option>`).join('');
  const sel=document.getElementById('addMaAuto'); if(sel)sel.innerHTML=opts;
}

// ADMIN ÜBERSICHT
window.renderAdminUebersicht = ()=>{
  const div=document.getElementById('adminUebersicht'); if(!div)return;
  const kfzMap={};
  const frei=werkzeuge.filter(w=>!auswahlen[w.id]);
  Object.entries(auswahlen).forEach(([wzId,data])=>{
    const key=data.kfz+'||'+data.name;
    if(!kfzMap[key])kfzMap[key]={name:data.name,kfz:data.kfz,items:[]};
    const wz=werkzeuge.find(w=>w.id===wzId);
    if(wz)kfzMap[key].items.push(wz);
  });
  let html=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;color:var(--muted);font-family:var(--mono);margin-bottom:8px">🏭 LAGER FREI (${frei.length})</div>
    ${frei.length?frei.map(w=>`<div style="font-size:13px;padding:3px 0;color:var(--muted)">${w.emoji||'🔧'} ${w.name}</div>`).join(''):'<div style="font-size:12px;color:var(--muted)">Alle vergeben</div>'}
  </div>`;
  html+=Object.values(kfzMap).map(k=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px">${k.kfz}</span>
      <span style="font-size:13px;font-weight:600">${k.name}</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)">${k.items.length} Werkzeug${k.items.length!==1?'e':''}</span>
    </div>
    ${k.items.map(w=>`<div style="font-size:13px;padding:3px 0">${w.emoji||'🔧'} ${w.name}</div>`).join('')}
  </div>`).join('');
  div.innerHTML=html;
};

// ADMIN TABS
window.adminTab = (btn,tab)=>{
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  ['tw','tm','ta','to'].forEach(t=>document.getElementById(t).style.display=t===tab?'block':'none');
  if(tab==='to')renderAdminUebersicht();
  if(tab==='tm')renderAdminMa();
  if(tab==='ta')renderAdminAutos();
};

// ENTER
document.getElementById('inputKfz').addEventListener('keydown',e=>{if(e.key==='Enter')window.monteurLogin();});
document.getElementById('inputPw').addEventListener('keydown',e=>{if(e.key==='Enter')window.adminLogin();});
</script>
