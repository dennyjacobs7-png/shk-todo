<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Werkzeug – Heesch SHK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111;--surface:#1c1c1c;--surface2:#252525;--border:#2e2e2e;
  --red:#CC0000;--red2:#991000;--green:#2a6e2e;--green2:#3dba44;
  --orange:#b36200;--orange2:#ff9a2e;--blue:#1a4a8a;--blue2:#4a9eff;
  --text:#f0ede8;--muted:#777;
  --sans:'Barlow',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
 
/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#2a0000 0%,#111 60%);}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:8px;}
.login-logo h1{font-size:22px;font-weight:700;display:inline;}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.login-title{font-size:16px;font-weight:600;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;font-family:var(--mono);}
.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--red);}
.fg input::placeholder{color:var(--muted);}
.fg select option{background:var(--surface2);}
.btn-p{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;margin-top:6px;}
.btn-p:hover{background:var(--red2);}
.admin-link{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
.admin-link button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;font-family:var(--sans);}
.login-err{background:#3a1010;border:1px solid var(--red2);border-radius:6px;padding:8px 12px;font-size:13px;color:#ff8080;margin-bottom:12px;display:none;}
 
/* TOPBAR */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.btn-sm:hover{color:var(--text);border-color:#555;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
.sync-dot.live{background:var(--green2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.user-tag{font-size:12px;color:var(--muted);font-family:var(--mono);padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;}
 
/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.nav-tab{flex:1;min-width:80px;padding:12px 8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--sans);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--red);}
 
/* STATUS BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap;font-weight:600;}
.badge-auto{background:#0d1f0e;color:var(--green2);border:1px solid var(--green);}
.badge-frei{background:#1a2a1a;color:#7bc87f;border:1px solid #2a5a2e;}
.badge-wartung{background:#2a1f00;color:var(--orange2);border:1px solid var(--orange);}
.badge-defekt{background:#3a1010;color:#ff8080;border:1px solid #5a1a1a;}
 
/* ALLE WERKZEUGE TAB */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--surface2);}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans);}
.filter-btn.active{background:var(--surface);border-color:var(--border);color:var(--text);}
.search-inp{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text);outline:none;font-family:var(--sans);width:150px;}
.search-inp:focus{border-color:var(--red);}
.search-inp::placeholder{color:var(--muted);}
 
.wz-liste{padding:12px 16px;flex:1;overflow-y:auto;}
.wz-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .15s;}
.wz-icon{width:38px;height:38px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.wz-info{flex:1;min-width:0;}
.wz-name{font-size:14px;font-weight:600;}
.wz-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.wz-auto{font-size:11px;font-family:var(--mono);margin-top:3px;color:var(--muted);}
.wz-auto span{color:var(--text);}
 
/* ÜBERSICHT TAB */
.uebersicht-body{padding:16px;flex:1;overflow-y:auto;}
.auto-reiter-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.auto-reiter{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--surface2);transition:all .2s;font-family:var(--sans);}
.auto-reiter.active{background:var(--red);border-color:var(--red);color:#fff;}
.auto-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.auto-card-header{padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.auto-plate{font-family:var(--mono);font-size:14px;font-weight:600;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 12px;}
.auto-desc{font-size:13px;color:var(--muted);flex:1;}
.auto-count{font-size:11px;font-family:var(--mono);color:var(--muted);}
.auto-wz-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.auto-wz-item:last-child{border-bottom:none;}
.auto-wz-icon{font-size:18px;width:28px;text-align:center;}
.auto-wz-info{flex:1;}
.auto-wz-name{font-size:13px;font-weight:600;}
.auto-wz-meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.auto-empty{padding:20px 16px;text-align:center;color:var(--muted);font-size:13px;}
 
/* ADMIN */
#adminScreen{background:var(--bg);}
.admin-body{padding:20px;max-width:700px;margin:0 auto;}
.admin-section{margin-bottom:28px;}
.admin-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.form-row .fg{flex:1;min-width:130px;margin-bottom:0;}
.btn-add{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;}
.btn-add:hover{background:#1e5522;}
.admin-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;flex-wrap:wrap;}
.item-info{flex:1;min-width:120px;}
.item-name{font-size:13px;font-weight:600;}
.item-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.btn-del{background:transparent;border:1px solid #3a1010;color:#cc4444;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;white-space:nowrap;}
.btn-del:hover{background:#3a1010;}
.status-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--text);font-family:var(--mono);cursor:pointer;outline:none;}
.status-sel option{background:var(--surface2);}
.admin-tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto;}
.admin-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans);white-space:nowrap;}
.admin-tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);}
 
/* EMOJI PICKER */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.emoji-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.emoji-btn:hover,.emoji-btn.selected{border-color:var(--red);background:var(--surface);}
.emoji-selected-display{font-size:24px;width:44px;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;}
 
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;}
.empty-state .ei{font-size:36px;margin-bottom:10px;}
</style>
</head>
<body>
 
<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div><span class="dot"></span><h1>Heesch SHK</h1></div>
      <p>WERKZEUGVERWALTUNG</p>
    </div>
    <div id="loginErr" class="login-err"></div>
    <div id="monteurForm">
      <div class="login-title">Monteur anmelden</div>
      <div class="fg"><label>Vollständiger Name</label><input type="text" id="inputName" placeholder="z.B. Klaus Müller" autocomplete="off"></div>
      <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="inputKfz" placeholder="z.B. IZ-KL 123" style="text-transform:uppercase" autocomplete="off"></div>
      <button class="btn-p" onclick="monteurLogin()">Anmelden</button>
      <div class="admin-link"><button onclick="showAdmin()">Admin-Bereich</button></div>
    </div>
    <div id="adminForm" style="display:none">
      <div class="login-title">Admin-Anmeldung</div>
      <div class="fg"><label>Passwort</label><input type="password" id="inputPw" placeholder="••••••••"></div>
      <button class="btn-p" onclick="adminLogin()">Einloggen</button>
      <div class="admin-link"><button onclick="showMonteur()">← Zurück</button></div>
    </div>
  </div>
</div>
 
<!-- MAIN -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Heesch SHK</span></div>
    <div class="topbar-right">
      <span id="syncDot" class="sync-dot"></span>
      <div class="user-tag" id="userTag">–</div>
      <button class="btn-sm" onclick="abmelden()">Abmelden</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="mainTab(this,'tAlle')">🔧 Alle Werkzeuge</button>
    <button class="nav-tab" onclick="mainTab(this,'tUebersicht')">🚐 Fahrzeuge</button>
  </div>
 
  <!-- ALLE WERKZEUGE -->
  <div id="tAlle" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="filter-bar">
      <button class="filter-btn active" data-f="alle" onclick="setFilter(this)">Alle</button>
      <button class="filter-btn" data-f="auto" onclick="setFilter(this)">Im Auto</button>
      <button class="filter-btn" data-f="frei" onclick="setFilter(this)">Frei</button>
      <button class="filter-btn" data-f="wartung" onclick="setFilter(this)">Wartung</button>
      <button class="filter-btn" data-f="defekt" onclick="setFilter(this)">Defekt</button>
      <input type="text" class="search-inp" id="searchWz" placeholder="Suchen..." oninput="renderAlle()">
    </div>
    <div class="wz-liste" id="wzListe"><div class="empty-state"><div class="ei">⏳</div>Lade...</div></div>
  </div>
 
  <!-- FAHRZEUG ÜBERSICHT -->
  <div id="tUebersicht" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="uebersicht-body" id="uebersichtBody">
      <div class="empty-state"><div class="ei">⏳</div>Lade...</div>
    </div>
  </div>
</div>
 
<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Admin</span></div>
    <div class="topbar-right">
      <span id="syncDotAdmin" class="sync-dot"></span>
      <button class="btn-sm" onclick="adminAbmelden()">Abmelden</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="adminTab(this,'aw')">Werkzeuge</button>
    <button class="admin-tab" onclick="adminTab(this,'aa')">Autos</button>
    <button class="admin-tab" onclick="adminTab(this,'ao')">Übersicht</button>
  </div>
  <div class="admin-body">
 
    <!-- WERKZEUGE -->
    <div id="aw">
      <div class="admin-section">
        <div class="admin-section-title">Werkzeug / Maschine hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Art</label>
              <select id="addArt">
                <option value="Werkzeug">Werkzeug</option>
                <option value="Maschine">Maschine</option>
                <option value="Messgerät">Messgerät</option>
                <option value="Elektrowerkzeug">Elektrowerkzeug</option>
                <option value="Heizung">Heizung</option>
                <option value="Sonstiges">Sonstiges</option>
              </select>
            </div>
            <div class="fg"><label>Marke</label><input type="text" id="addMarke" placeholder="z.B. Bosch, Hilti, Viessmann"></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Name / Modell</label><input type="text" id="addName" placeholder="z.B. Schlagbohrmaschine GSB 21-2"></div>
            <div class="fg"><label>Seriennummer</label><input type="text" id="addSerial" placeholder="z.B. SN-2024-001"></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Zugeordnetes Auto</label>
              <select id="addAuto"><option value="">– kein Auto –</option></select>
            </div>
            <div class="fg"><label>Status</label>
              <select id="addStatus">
                <option value="frei">Frei</option>
                <option value="auto">Im Auto</option>
                <option value="wartung">Zur Wartung</option>
                <option value="defekt">Defekt</option>
              </select>
            </div>
          </div>
          <div class="fg"><label>Symbol wählen</label>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
              <div class="emoji-selected-display" id="emojiDisplay" onclick="toggleEmojiPicker()">🔧</div>
              <span style="font-size:12px;color:var(--muted)">Tippe auf das Symbol um es zu ändern</span>
            </div>
            <div id="emojiPicker" style="display:none">
              <div class="emoji-grid" id="emojiGrid"></div>
            </div>
          </div>
          <button class="btn-add" onclick="wzHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Einträge (<span id="adminWzCount">0</span>)</div>
        <div id="adminWzListe"></div>
      </div>
    </div>
 
    <!-- AUTOS -->
    <div id="aa" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Auto hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="addAutoKfz" placeholder="z.B. IZ-HH 123" style="text-transform:uppercase"></div>
            <div class="fg"><label>Beschreibung</label><input type="text" id="addAutoDesc" placeholder="z.B. Weißer Sprinter"></div>
          </div>
          <button class="btn-add" onclick="autoHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Autos (<span id="adminAutoCount">0</span>)</div>
        <div id="adminAutoListe"></div>
      </div>
    </div>
 
    <!-- ÜBERSICHT -->
    <div id="ao" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Übersicht nach Fahrzeug</div>
        <div id="adminUebersicht"></div>
      </div>
    </div>
 
  </div>
</div>
 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyByjMOVQ12Grua48QwGGvvnB4lze-isyv0",
  authDomain: "shk-todo-da35b.firebaseapp.com",
  projectId: "shk-todo-da35b",
  storageBucket: "shk-todo-da35b.firebasestorage.app",
  messagingSenderId: "978821411452",
  appId: "1:978821411452:web:3a295d420ad277130d4ff9"
};
 
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const ADMIN_PW = "Heesch2000!";
 
const EMOJIS = ['🔧','🪛','⚡','🔩','🪚','🔨','🪝','🔑','🪤','🧰','📐','📏','🪜','💡','🔌','🪣','🌡️','⚙️','🔬','🛠️','🪠','🚿','🛁','🚰','♨️','🔥','❄️','💨','🏗️','📦'];
const STATUS_LABEL = {auto:'Im Auto',frei:'Frei',wartung:'Zur Wartung',defekt:'Defekt'};
const STATUS_BADGE = {auto:'badge-auto',frei:'badge-frei',wartung:'badge-wartung',defekt:'badge-defekt'};
 
let werkzeuge=[], autos=[], currentUser=null, activeFilter='alle', selectedEmoji='🔧', selectedAutoReiter='alle';
 
function sync(id){const d=document.getElementById(id);if(d)d.className='sync-dot live';}
 
// EMOJI PICKER
const grid=document.getElementById('emojiGrid');
EMOJIS.forEach(e=>{
  const btn=document.createElement('button');
  btn.className='emoji-btn'; btn.textContent=e;
  btn.onclick=()=>{
    selectedEmoji=e;
    document.getElementById('emojiDisplay').textContent=e;
    document.getElementById('emojiPicker').style.display='none';
    document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  };
  grid.appendChild(btn);
});
window.toggleEmojiPicker=()=>{
  const p=document.getElementById('emojiPicker');
  p.style.display=p.style.display==='none'?'block':'none';
};
 
// LISTENERS
onSnapshot(collection(db,'werkzeuge2'), snap=>{
  werkzeuge=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>(a.art+a.marke+a.name).localeCompare(b.art+b.marke+b.name));
  sync('syncDot'); sync('syncDotAdmin');
  renderAlle(); renderUebersicht(); renderAdminWz(); renderAdminUebersicht();
});
onSnapshot(collection(db,'autos'), snap=>{
  autos=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.kfz.localeCompare(b.kfz));
  renderUebersicht(); renderAdminAutos(); updateAutoSelects(); renderAdminUebersicht();
});
 
// LOGIN
window.showAdmin=()=>{document.getElementById('monteurForm').style.display='none';document.getElementById('adminForm').style.display='block';err('');};
window.showMonteur=()=>{document.getElementById('adminForm').style.display='none';document.getElementById('monteurForm').style.display='block';err('');};
function err(m){const e=document.getElementById('loginErr');e.textContent=m;e.style.display=m?'block':'none';}
window.monteurLogin=()=>{
  const name=document.getElementById('inputName').value.trim();
  const kfz=document.getElementById('inputKfz').value.trim().toUpperCase();
  if(!name){err('Bitte Namen eingeben.');return;}
  if(!kfz){err('Bitte KFZ-Kennzeichen eingeben.');return;}
  currentUser={name,kfz};
  document.getElementById('userTag').textContent=name+' · '+kfz;
  showScreen('mainScreen');
};
window.adminLogin=()=>{
  if(document.getElementById('inputPw').value!==ADMIN_PW){err('Falsches Passwort.');return;}
  showScreen('adminScreen');
};
window.abmelden=()=>{currentUser=null;showScreen('loginScreen');document.getElementById('inputName').value='';document.getElementById('inputKfz').value='';};
window.adminAbmelden=()=>{document.getElementById('inputPw').value='';showScreen('loginScreen');};
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
 
// MAIN TABS
window.mainTab=(btn,tab)=>{
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('tAlle').style.display=tab==='tAlle'?'flex':'none';
  document.getElementById('tUebersicht').style.display=tab==='tUebersicht'?'flex':'none';
  if(tab==='tUebersicht')renderUebersicht();
};
 
// FILTER
window.setFilter=(btn)=>{
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  activeFilter=btn.dataset.f; renderAlle();
};
 
// RENDER ALLE
window.renderAlle=()=>{
  const liste=document.getElementById('wzListe');
  const search=(document.getElementById('searchWz')?.value||'').toLowerCase();
  let filtered=werkzeuge.filter(w=>{
    const matchS=!search||(w.name||'').toLowerCase().includes(search)||(w.marke||'').toLowerCase().includes(search)||(w.art||'').toLowerCase().includes(search)||(w.serial||'').toLowerCase().includes(search);
    const matchF=activeFilter==='alle'||(w.status||'frei')===activeFilter;
    return matchS&&matchF;
  });
  if(!filtered.length){liste.innerHTML=`<div class="empty-state"><div class="ei">🔍</div>Keine Einträge gefunden</div>`;return;}
 
  // Gruppe nach Art
  const gruppen={};
  filtered.forEach(w=>{const k=w.art||'Sonstiges';if(!gruppen[k])gruppen[k]=[];gruppen[k].push(w);});
 
  liste.innerHTML=Object.entries(gruppen).map(([art,items])=>`
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);padding:8px 4px 4px;">${art}</div>
    ${items.map(w=>{
      const status=w.status||'frei';
      const autoTxt=w.autoKfz?`<span style="color:var(--text)">${w.autoKfz}</span>`:''
      return `<div class="wz-card">
        <div class="wz-icon">${w.emoji||'🔧'}</div>
        <div class="wz-info">
          <div class="wz-name">${w.marke?'<span style="color:var(--muted);font-weight:400">'+w.marke+'</span> ':''}${w.name}</div>
          <div class="wz-meta">${w.serial?'SN: '+w.serial:''}</div>
          ${w.autoKfz?`<div class="wz-auto">🚐 ${autoTxt}</div>`:''}
        </div>
        <span class="badge ${STATUS_BADGE[status]}">${STATUS_LABEL[status]}</span>
      </div>`;
    }).join('')}
  `).join('');
};
 
// RENDER ÜBERSICHT (Fahrzeuge)
window.renderUebersicht=()=>{
  const body=document.getElementById('uebersichtBody'); if(!body)return;
 
  // Reiter bauen
  const reiterHtml=`
    <div class="auto-reiter-wrap">
      <button class="auto-reiter ${selectedAutoReiter==='alle'?'active':''}" onclick="setAutoReiter('alle',this)">Alle</button>
      ${autos.map(a=>`<button class="auto-reiter ${selectedAutoReiter===a.id?'active':''}" onclick="setAutoReiter('${a.id}',this)">${a.kfz}</button>`).join('')}
      <button class="auto-reiter ${selectedAutoReiter==='kein'?'active':''}" onclick="setAutoReiter('kein',this)">Kein Auto</button>
    </div>`;
 
  let anzeigeAutos=autos;
  let showKeinAuto=false;
  if(selectedAutoReiter==='kein'){ anzeigeAutos=[]; showKeinAuto=true; }
  else if(selectedAutoReiter!=='alle'){ anzeigeAutos=autos.filter(a=>a.id===selectedAutoReiter); }
 
  let cardsHtml='';
 
  if(selectedAutoReiter==='alle'||selectedAutoReiter==='kein'){
    const ohneAuto=werkzeuge.filter(w=>!w.autoKfz);
    if(ohneAuto.length||showKeinAuto){
      cardsHtml+=autoCard('Kein Fahrzeug','–','',ohneAuto);
    }
  }
 
  anzeigeAutos.forEach(a=>{
    const wzList=werkzeuge.filter(w=>w.autoKfz===a.kfz);
    cardsHtml+=autoCard(a.kfz,a.desc||'',a.id,wzList);
  });
 
  if(!cardsHtml) cardsHtml=`<div class="empty-state"><div class="ei">🚐</div>Noch keine Fahrzeuge angelegt</div>`;
 
  body.innerHTML=reiterHtml+cardsHtml;
};
 
function autoCard(plate,desc,id,items){
  const stats={auto:0,frei:0,wartung:0,defekt:0};
  items.forEach(w=>stats[w.status||'frei']++);
  const statsHtml=Object.entries(stats).filter(([,v])=>v>0).map(([s,v])=>`<span class="badge ${STATUS_BADGE[s]}" style="margin-right:4px">${v} ${STATUS_LABEL[s]}</span>`).join('');
  return `<div class="auto-card" style="margin-bottom:16px">
    <div class="auto-card-header">
      <span class="auto-plate">${plate}</span>
      <span class="auto-desc">${desc}</span>
      <span class="auto-count">${items.length} Einträge</span>
    </div>
    ${statsHtml?`<div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;">${statsHtml}</div>`:''}
    ${items.length?items.map(w=>{
      const status=w.status||'frei';
      return `<div class="auto-wz-item">
        <div class="auto-wz-icon">${w.emoji||'🔧'}</div>
        <div class="auto-wz-info">
          <div class="auto-wz-name">${w.marke?`<span style="color:var(--muted);font-weight:400">${w.marke}</span> `:''}${w.name}</div>
          <div class="auto-wz-meta">${w.art||''}${w.serial?' · SN: '+w.serial:''}</div>
        </div>
        <span class="badge ${STATUS_BADGE[status]}">${STATUS_LABEL[status]}</span>
      </div>`;
    }).join(''):`<div class="auto-empty">Keine Einträge</div>`}
  </div>`;
}
 
window.setAutoReiter=(val,btn)=>{
  selectedAutoReiter=val;
  document.querySelectorAll('.auto-reiter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderUebersicht();
};
 
// ADMIN WERKZEUG
window.wzHinzu=async()=>{
  const art=document.getElementById('addArt').value;
  const marke=document.getElementById('addMarke').value.trim();
  const name=document.getElementById('addName').value.trim();
  const serial=document.getElementById('addSerial').value.trim();
  const autoKfz=document.getElementById('addAuto').value;
  const status=document.getElementById('addStatus').value;
  if(!name){alert('Name ist Pflichtfeld.');return;}
  await addDoc(collection(db,'werkzeuge2'),{art,marke,name,serial,autoKfz,status,emoji:selectedEmoji});
  document.getElementById('addMarke').value='';
  document.getElementById('addName').value='';
  document.getElementById('addSerial').value='';
  document.getElementById('addAuto').value='';
  document.getElementById('addStatus').value='frei';
  selectedEmoji='🔧';
  document.getElementById('emojiDisplay').textContent='🔧';
};
 
window.wzLoeschen=async(id,btn)=>{
  const name=btn?btn.closest('.admin-item').querySelector('.item-name').textContent:'?';
  if(!confirm('"'+name+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'werkzeuge2',id));
};
 
window.wzStatusChange=async(id,val)=>{ await updateDoc(doc(db,'werkzeuge2',id),{status:val}); };
window.wzAutoChange=async(id,val)=>{ await updateDoc(doc(db,'werkzeuge2',id),{autoKfz:val}); };
 
window.renderAdminWz=()=>{
  const liste=document.getElementById('adminWzListe');if(!liste)return;
  document.getElementById('adminWzCount').textContent=werkzeuge.length;
  if(!werkzeuge.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Einträge.</div>';return;}
  liste.innerHTML=werkzeuge.map(w=>{
    const status=w.status||'frei';
    const autoOpts=autos.map(a=>`<option value="${a.kfz}" ${w.autoKfz===a.kfz?'selected':''}>${a.kfz}</option>`).join('');
    return `<div class="admin-item">
      <span style="font-size:20px">${w.emoji||'🔧'}</span>
      <div class="item-info">
        <div class="item-name">${w.marke?w.marke+' ':''}${w.name}</div>
        <div class="item-meta">${w.art||''}${w.serial?' · SN: '+w.serial:''}</div>
      </div>
      <select class="status-sel" onchange="wzStatusChange('${w.id}',this.value)">
        <option value="auto" ${status==='auto'?'selected':''}>Im Auto</option>
        <option value="frei" ${status==='frei'?'selected':''}>Frei</option>
        <option value="wartung" ${status==='wartung'?'selected':''}>Wartung</option>
        <option value="defekt" ${status==='defekt'?'selected':''}>Defekt</option>
      </select>
      <select class="status-sel" onchange="wzAutoChange('${w.id}',this.value)" style="min-width:100px">
        <option value="" ${!w.autoKfz?'selected':''}>– kein –</option>
        ${autoOpts}
      </select>
      <button class="btn-del" onclick="wzLoeschen('${w.id}',this)">Löschen</button>
    </div>`;
  }).join('');
};
 
// ADMIN AUTOS
window.autoHinzu=async()=>{
  const kfz=document.getElementById('addAutoKfz').value.trim().toUpperCase();
  const desc=document.getElementById('addAutoDesc').value.trim();
  if(!kfz){alert('KFZ-Kennzeichen ist Pflichtfeld.');return;}
  await addDoc(collection(db,'autos'),{kfz,desc:desc||''});
  document.getElementById('addAutoKfz').value='';
  document.getElementById('addAutoDesc').value='';
};
window.autoLoeschen=async(id,btn)=>{
  const kfz=btn?btn.closest('.admin-item').querySelector('.item-name').textContent:'?';
  if(!confirm('Auto "'+kfz+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'autos',id));
};
window.renderAdminAutos=()=>{
  const liste=document.getElementById('adminAutoListe');if(!liste)return;
  document.getElementById('adminAutoCount').textContent=autos.length;
  if(!autos.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Autos.</div>';return;}
  liste.innerHTML=autos.map(a=>`<div class="admin-item">
    <span style="font-size:20px">🚐</span>
    <div class="item-info"><div class="item-name">${a.kfz}</div><div class="item-meta">${a.desc||'–'}</div></div>
    <button class="btn-del" onclick="autoLoeschen('${a.id}',this)">Löschen</button>
  </div>`).join('');
};
 
function updateAutoSelects(){
  const opts='<option value="">– kein Auto –</option>'+autos.map(a=>`<option value="${a.kfz}">${a.kfz}${a.desc?' – '+a.desc:''}</option>`).join('');
  ['addAuto'].forEach(id=>{const s=document.getElementById(id);if(s)s.innerHTML=opts;});
}
 
// ADMIN ÜBERSICHT
window.renderAdminUebersicht=()=>{
  const div=document.getElementById('adminUebersicht');if(!div)return;
  let html='';
  const ohneAuto=werkzeuge.filter(w=>!w.autoKfz);
  if(ohneAuto.length){
    html+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--muted);font-family:var(--mono);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">OHNE FAHRZEUG (${ohneAuto.length})</div>`;
    html+=ohneAuto.map(w=>`<div style="font-size:13px;padding:4px 0;display:flex;align-items:center;gap:8px">${w.emoji||'🔧'} ${w.marke?w.marke+' ':''}${w.name} <span class="badge ${STATUS_BADGE[w.status||'frei']}">${STATUS_LABEL[w.status||'frei']}</span></div>`).join('');
    html+='</div>';
  }
  autos.forEach(a=>{
    const wz=werkzeuge.filter(w=>w.autoKfz===a.kfz);
    html+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--muted);font-family:var(--mono);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${a.kfz}${a.desc?' – '+a.desc:''} (${wz.length})</div>`;
    if(wz.length) html+=wz.map(w=>`<div style="font-size:13px;padding:4px 0;display:flex;align-items:center;gap:8px">${w.emoji||'🔧'} ${w.marke?w.marke+' ':''}${w.name} <span class="badge ${STATUS_BADGE[w.status||'frei']}">${STATUS_LABEL[w.status||'frei']}</span></div>`).join('');
    else html+=`<div style="font-size:12px;color:var(--muted)">Keine Einträge</div>`;
    html+='</div>';
  });
  div.innerHTML=html||'<div style="color:var(--muted);font-size:13px">Noch keine Daten.</div>';
};
 
// ADMIN TABS
window.adminTab=(btn,tab)=>{
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  ['aw','aa','ao'].forEach(t=>document.getElementById(t).style.display=t===tab?'block':'none');
};
 
// ENTER
document.getElementById('inputKfz').addEventListener('keydown',e=>{if(e.key==='Enter')window.monteurLogin();});
document.getElementById('inputPw').addEventListener('keydown',e=>{if(e.key==='Enter')window.adminLogin();});
