<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Werkzeug – Heesch SHK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111;--surface:#1c1c1c;--surface2:#252525;--border:#2e2e2e;
  --red:#CC0000;--red2:#991000;--green:#2a6e2e;--green2:#3dba44;
  --orange:#b36200;--orange2:#ff9a2e;--blue:#1a4a8a;--blue2:#4a9eff;
  --text:#f0ede8;--muted:#777;
  --sans:'Barlow',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
 
/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#2a0000 0%,#111 60%);}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:8px;}
.login-logo h1{font-size:22px;font-weight:700;display:inline;}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.login-title{font-size:16px;font-weight:600;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;font-family:var(--mono);}
.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--red);}
.fg input::placeholder{color:var(--muted);}
.fg select option{background:var(--surface2);}
.btn-p{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;margin-top:6px;}
.btn-p:hover{background:var(--red2);}
.admin-link{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
.admin-link button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;font-family:var(--sans);}
.login-err{background:#3a1010;border:1px solid var(--red2);border-radius:6px;padding:8px 12px;font-size:13px;color:#ff8080;margin-bottom:12px;display:none;}
 
/* TOPBAR */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.btn-sm:hover{color:var(--text);border-color:#555;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
.sync-dot.live{background:var(--green2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.user-tag{font-size:12px;color:var(--muted);font-family:var(--mono);padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;}
 
/* FILTER BAR */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.f-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans);}
.f-tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);}
.f-count{display:inline-block;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:3px;font-family:var(--mono);}
.search-inp-bar{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text);outline:none;font-family:var(--sans);width:160px;}
.search-inp-bar:focus{border-color:var(--red);}
.search-inp-bar::placeholder{color:var(--muted);}
 
/* MAIN LAYOUT */
.main-layout{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
@media(max-width:680px){.main-layout{grid-template-columns:1fr;}}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border);height:calc(100vh - 113px);overflow:hidden;}
.panel:last-child{border-right:none;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:8px;}
.panel-count{background:var(--surface2);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--muted);}
.panel-body{flex:1;overflow-y:auto;padding:12px;}
.kat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);padding:8px 4px 4px;}
 
/* STATUS BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap;font-weight:600;letter-spacing:.03em;}
.badge-auto{background:#0d1f0e;color:var(--green2);border:1px solid var(--green);}
.badge-frei{background:#1a2a3a;color:var(--blue2);border:1px solid var(--blue);}
.badge-wartung{background:#2a1f00;color:var(--orange2);border:1px solid var(--orange);}
.badge-defekt{background:#3a1010;color:#ff8080;border:1px solid #5a1a1a;}
 
/* ITEM CARDS */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:all .15s;}
.item-card.clickable{cursor:pointer;}
.item-card.clickable:hover{border-color:#3a3a3a;background:var(--surface2);}
.item-icon{width:38px;height:38px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.item-action{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:var(--sans);white-space:nowrap;transition:background .15s;}
.item-action:hover{background:var(--red2);}
.item-action.gruen{background:var(--green);}
.item-action.gruen:hover{background:#1e5522;}
 
/* KFZ GROUPS */
.kfz-section{margin-bottom:16px;}
.kfz-header{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;}
.kfz-plate{font-family:var(--mono);font-size:13px;font-weight:500;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;color:var(--text);letter-spacing:.06em;}
.kfz-monteur{font-size:13px;font-weight:600;flex:1;}
.kfz-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:4px;}
.kfz-item.w-item{background:#0d1f0e;border:1px solid var(--green);}
.kfz-item.m-item{background:#0d1525;border:1px solid var(--blue);}
.kfz-item-name{font-size:13px;flex:1;}
.kfz-item-meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.btn-zurueck{background:transparent;border:1px solid #3a1010;color:#cc4444;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap;}
.btn-zurueck:hover{background:#3a1010;}
.empty-panel{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;}
.empty-panel .ei{font-size:36px;margin-bottom:10px;}
 
/* EMOJI PICKER */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:8px;}
.emoji-opt{font-size:22px;padding:6px;border-radius:6px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .15s;background:var(--surface2);}
.emoji-opt:hover{border-color:var(--red);}
.emoji-opt.selected{border-color:var(--red);background:#2a0a0a;}
.selected-emoji-preview{font-size:28px;text-align:center;padding:8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
 
/* ADMIN */
#adminScreen{background:var(--bg);}
.admin-body{padding:20px;max-width:720px;margin:0 auto;}
.admin-section{margin-bottom:28px;}
.admin-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.form-row .fg{flex:1;min-width:130px;margin-bottom:0;}
.btn-add{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .2s;}
.btn-add:hover{background:#1e5522;}
.admin-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;flex-wrap:wrap;}
.admin-item-info{flex:1;min-width:150px;}
.admin-item-name{font-size:13px;font-weight:600;}
.admin-item-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.btn-del{background:transparent;border:1px solid #3a1010;color:#cc4444;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.btn-del:hover{background:#3a1010;}
.admin-tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.admin-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans);}
.admin-tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);}
.status-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:var(--mono);cursor:pointer;outline:none;}
.status-select option{background:var(--surface2);}
</style>
</head>
<body>
 
<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div><span class="dot"></span><h1>Heesch SHK</h1></div>
      <p>WERKZEUGVERWALTUNG</p>
    </div>
    <div id="loginErr" class="login-err"></div>
    <div id="monteurForm">
      <div class="login-title">Monteur anmelden</div>
      <div class="fg"><label>Vollständiger Name</label><input type="text" id="inputName" placeholder="z.B. Klaus Müller" autocomplete="off"></div>
      <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="inputKfz" placeholder="z.B. IZ-KL 123" style="text-transform:uppercase" autocomplete="off"></div>
      <button class="btn-p" onclick="monteurLogin()">Anmelden</button>
      <div class="admin-link"><button onclick="showAdmin()">Admin-Bereich</button></div>
    </div>
    <div id="adminForm" style="display:none">
      <div class="login-title">Admin-Anmeldung</div>
      <div class="fg"><label>Passwort</label><input type="password" id="inputPw" placeholder="••••••••"></div>
      <button class="btn-p" onclick="adminLogin()">Einloggen</button>
      <div class="admin-link"><button onclick="showMonteur()">← Zurück</button></div>
    </div>
  </div>
</div>
 
<!-- MAIN -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Heesch SHK</span></div>
    <div class="topbar-right">
      <span id="syncDot" class="sync-dot"></span>
      <div class="user-tag" id="userTag">–</div>
      <button class="btn-sm" onclick="abmelden()">Abmelden</button>
    </div>
  </div>
 
  <div class="filter-bar">
    <button class="f-tab active" data-f="alle" onclick="setFilter(this)">Alle <span class="f-count" id="cAlle">0</span></button>
    <button class="f-tab" data-f="frei" onclick="setFilter(this)">Frei</button>
    <button class="f-tab" data-f="auto" onclick="setFilter(this)">Im Auto</button>
    <button class="f-tab" data-f="wartung" onclick="setFilter(this)">Wartung</button>
    <button class="f-tab" data-f="defekt" onclick="setFilter(this)">Defekt</button>
    <input type="text" class="search-inp-bar" id="searchMain" placeholder="Suchen..." oninput="renderMain()">
  </div>
 
  <div class="main-layout">
    <!-- LINKES PANEL: ÜBERSICHT -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📦 Übersicht <span class="panel-count" id="panelCount">0</span></span>
      </div>
      <div class="panel-body" id="mainPanel"><div class="empty-panel"><div class="ei">⏳</div>Lade...</div></div>
    </div>
 
    <!-- RECHTES PANEL: KFZ -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🚐 Im Fahrzeug <span class="panel-count" id="kfzCount">0</span></span>
      </div>
      <div class="panel-body" id="kfzPanel"><div class="empty-panel"><div class="ei">⏳</div>Lade...</div></div>
    </div>
  </div>
</div>
 
<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-dot"></div><span class="topbar-title">Admin – Verwaltung</span></div>
    <div class="topbar-right">
      <span id="syncDotAdmin" class="sync-dot"></span>
      <button class="btn-sm" onclick="adminAbmelden()">Abmelden</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="adminTab(this,'ti')">Artikel</button>
    <button class="admin-tab" onclick="adminTab(this,'ta')">Autos</button>
    <button class="admin-tab" onclick="adminTab(this,'to')">Übersicht</button>
  </div>
  <div class="admin-body">
 
    <!-- ARTIKEL (Werkzeug + Maschinen zusammen) -->
    <div id="ti">
      <div class="admin-section">
        <div class="admin-section-title">Artikel hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Name / Bezeichnung</label><input type="text" id="addName" placeholder="z.B. Schlagbohrmaschine"></div>
            <div class="fg"><label>Marke</label><input type="text" id="addMarke" placeholder="z.B. Bosch, Hilti, Viessmann"></div>
          </div>
          <div class="form-row">
            <div class="fg">
              <label>Art</label>
              <select id="addArt">
                <option value="Werkzeug">Werkzeug</option>
                <option value="Maschine">Maschine</option>
                <option value="Messgerät">Messgerät</option>
                <option value="Elektrowerkzeug">Elektrowerkzeug</option>
                <option value="Handwerkzeug">Handwerkzeug</option>
                <option value="Heizung">Heizung</option>
                <option value="Pumpe">Pumpe</option>
                <option value="Sonstiges">Sonstiges</option>
              </select>
            </div>
            <div class="fg"><label>Seriennummer</label><input type="text" id="addSerial" placeholder="z.B. SN-2024-001"></div>
          </div>
          <div class="form-row">
            <div class="fg">
              <label>Symbol auswählen</label>
              <div class="selected-emoji-preview" id="emojiPreview">🔧</div>
              <div class="emoji-grid" id="emojiGrid"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="fg">
              <label>Zugeordnetes Auto (optional)</label>
              <select id="addAuto"><option value="">– kein Auto –</option></select>
            </div>
            <div class="fg">
              <label>Anfangsstatus</label>
              <select id="addStatus">
                <option value="frei">Frei</option>
                <option value="auto">Im Auto</option>
                <option value="wartung">Zur Wartung</option>
                <option value="defekt">Defekt</option>
              </select>
            </div>
          </div>
          <button class="btn-add" onclick="artikelHinzu()">+ Artikel hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Artikel (<span id="adminArtikelCount">0</span>)</div>
        <div id="adminArtikelListe"></div>
      </div>
    </div>
 
    <!-- AUTOS -->
    <div id="ta" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Auto hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>KFZ-Kennzeichen</label><input type="text" id="addAutoKfz" placeholder="z.B. IZ-HH 123" style="text-transform:uppercase"></div>
            <div class="fg"><label>Beschreibung</label><input type="text" id="addAutoDesc" placeholder="z.B. Weißer Sprinter"></div>
          </div>
          <button class="btn-add" onclick="autoHinzu()">+ Auto hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Autos (<span id="adminAutoCount">0</span>)</div>
        <div id="adminAutoListe"></div>
      </div>
    </div>
 
    <!-- ÜBERSICHT -->
    <div id="to" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Gesamtübersicht</div>
        <div id="adminUebersicht"></div>
      </div>
    </div>
 
  </div>
</div>
 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyByjMOVQ12Grua48QwGGvvnB4lze-isyv0",
  authDomain: "shk-todo-da35b.firebaseapp.com",
  projectId: "shk-todo-da35b",
  storageBucket: "shk-todo-da35b.firebasestorage.app",
  messagingSenderId: "978821411452",
  appId: "1:978821411452:web:3a295d420ad277130d4ff9"
};
 
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const ADMIN_PW = "Heesch2000!";
 
const EMOJIS = ['🔧','⚙️','🔨','🪛','🔩','🪚','🔌','🔋','📏','🪜','🧰','🪤','⚡','🌡️','💧','🔥','❄️','🏗️','🚿','🛁','🪠','🔑','🪝','🔦','🧲','📦','🚐','🛠️','⛏️','🪣'];
 
const STATUS_LABELS = { auto:'Im Auto', frei:'Frei', wartung:'Zur Wartung', defekt:'Defekt' };
const STATUS_BADGE  = { auto:'badge-auto', frei:'badge-frei', wartung:'badge-wartung', defekt:'badge-defekt' };
 
let artikel = [], autos = [], currentUser = null, activeFilter = 'alle', selectedEmoji = '🔧';
 
// EMOJI GRID
function buildEmojiGrid(){
  const grid = document.getElementById('emojiGrid');
  if(!grid) return;
  grid.innerHTML = EMOJIS.map(e=>`<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
}
window.selectEmoji = (e)=>{ selectedEmoji=e; document.getElementById('emojiPreview').textContent=e; buildEmojiGrid(); };
buildEmojiGrid();
 
function sync(id){ const d=document.getElementById(id); if(d)d.className='sync-dot live'; }
 
// LISTENERS
onSnapshot(collection(db,'artikel'), snap=>{
  artikel = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
  sync('syncDot'); sync('syncDotAdmin');
  renderMain(); renderKfz(); renderAdminArtikel(); renderAdminUebersicht();
});
 
onSnapshot(collection(db,'autos'), snap=>{
  autos = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.kfz.localeCompare(b.kfz));
  renderAdminAutos(); updateAutoSelects();
});
 
// LOGIN
window.showAdmin   = ()=>{ document.getElementById('monteurForm').style.display='none'; document.getElementById('adminForm').style.display='block'; loginErr(''); };
window.showMonteur = ()=>{ document.getElementById('adminForm').style.display='none'; document.getElementById('monteurForm').style.display='block'; loginErr(''); };
function loginErr(msg){ const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display=msg?'block':'none'; }
 
window.monteurLogin = ()=>{
  const name=document.getElementById('inputName').value.trim();
  const kfz=document.getElementById('inputKfz').value.trim().toUpperCase();
  if(!name){loginErr('Bitte Namen eingeben.');return;}
  if(!kfz){loginErr('Bitte KFZ-Kennzeichen eingeben.');return;}
  currentUser={name,kfz};
  document.getElementById('userTag').textContent=name+' · '+kfz;
  showScreen('mainScreen');
};
window.adminLogin = ()=>{
  if(document.getElementById('inputPw').value!==ADMIN_PW){loginErr('Falsches Passwort.');return;}
  showScreen('adminScreen');
};
window.abmelden = ()=>{ currentUser=null; showScreen('loginScreen'); document.getElementById('inputName').value=''; document.getElementById('inputKfz').value=''; };
window.adminAbmelden = ()=>{ document.getElementById('inputPw').value=''; showScreen('loginScreen'); };
 
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
 
// FILTER
window.setFilter = (btn)=>{
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  activeFilter=btn.dataset.f; renderMain();
};
 
// RENDER MAIN (linkes Panel)
window.renderMain = ()=>{
  const panel=document.getElementById('mainPanel');
  const search=(document.getElementById('searchMain')?.value||'').toLowerCase();
 
  let filtered=artikel.filter(a=>{
    const matchSearch=!search||a.name.toLowerCase().includes(search)||(a.marke||'').toLowerCase().includes(search)||(a.serial||'').toLowerCase().includes(search)||(a.art||'').toLowerCase().includes(search);
    const status=a.status||'frei';
    const matchFilter=activeFilter==='alle'||status===activeFilter;
    return matchSearch&&matchFilter;
  });
 
  document.getElementById('cAlle').textContent=artikel.length;
  document.getElementById('panelCount').textContent=filtered.length;
 
  if(!filtered.length){ panel.innerHTML=`<div class="empty-panel"><div class="ei">🔍</div>Keine Artikel gefunden</div>`; return; }
 
  // Gruppieren nach Art
  const gruppen={};
  filtered.forEach(a=>{ if(!gruppen[a.art])gruppen[a.art]=[]; gruppen[a.art].push(a); });
 
  panel.innerHTML=Object.entries(gruppen).map(([art,items])=>`
    <div class="kat-label">${art}</div>
    ${items.map(a=>{
      const status=a.status||'frei';
      const kannMitnehmen=currentUser&&status==='frei';
      const istMeins=currentUser&&a.autoKfz===currentUser.kfz;
      return `<div class="item-card ${kannMitnehmen?'clickable':''}" ${kannMitnehmen?`onclick="mitnehmen('${a.id}','${a.name}')"`:''}> 
        <div class="item-icon">${a.emoji||'🔧'}</div>
        <div class="item-info">
          <div class="item-name">${a.name}</div>
          <div class="item-meta">${a.marke?a.marke+' · ':''}${a.serial?'SN: '+a.serial:''}</div>
          ${a.autoKfz?`<div class="item-meta" style="margin-top:2px">🚐 ${a.autoKfz}</div>`:''}
        </div>
        <span class="badge ${STATUS_BADGE[status]}">${STATUS_LABELS[status]}</span>
        ${kannMitnehmen?`<button class="item-action" onclick="event.stopPropagation();mitnehmen('${a.id}','${a.name}')">→</button>`:''}
        ${istMeins&&status==='auto'?`<button class="item-action gruen" onclick="event.stopPropagation();zurueckLegen('${a.id}','${a.name}')">←</button>`:''}
      </div>`;
    }).join('')}
  `).join('');
};
 
// RENDER KFZ (rechtes Panel)
window.renderKfz = ()=>{
  const panel=document.getElementById('kfzPanel');
  const imAuto=artikel.filter(a=>a.status==='auto'&&a.autoKfz);
  document.getElementById('kfzCount').textContent=imAuto.length;
 
  if(!imAuto.length){ panel.innerHTML=`<div class="empty-panel"><div class="ei">🚐</div>Kein Artikel im Fahrzeug</div>`; return; }
 
  // Gruppieren nach KFZ
  const kfzMap={};
  imAuto.forEach(a=>{ if(!kfzMap[a.autoKfz])kfzMap[a.autoKfz]=[]; kfzMap[a.autoKfz].push(a); });
 
  // Eigenes KFZ zuerst
  const sorted=Object.entries(kfzMap).sort(([a],[b])=>{
    if(currentUser&&a===currentUser.kfz)return -1;
    if(currentUser&&b===currentUser.kfz)return 1;
    return a.localeCompare(b);
  });
 
  panel.innerHTML=sorted.map(([kfz,items])=>{
    const istMeins=currentUser&&kfz===currentUser.kfz;
    const autoInfo=autos.find(a=>a.kfz===kfz);
    return `<div class="kfz-section">
      <div class="kfz-header">
        <span class="kfz-plate">${kfz}</span>
        <span class="kfz-monteur">${autoInfo?.desc||''}${istMeins?' <span style="font-size:10px;color:var(--green2)">(Mein Auto)</span>':''}</span>
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${items.length} Stk</span>
      </div>
      ${items.map(a=>`<div class="kfz-item w-item">
        <span style="font-size:16px">${a.emoji||'🔧'}</span>
        <div style="flex:1;min-width:0">
          <div class="kfz-item-name">${a.name}</div>
          <div class="kfz-item-meta">${a.marke||''}${a.serial?' · SN:'+a.serial:''}</div>
        </div>
        ${istMeins?`<button class="btn-zurueck" onclick="zurueckLegen('${a.id}','${a.name}')">← Zurück</button>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
};
 
// AKTIONEN
window.mitnehmen = async (id, name)=>{
  if(!currentUser)return;
  if(!confirm('"'+name+'" mitnehmen?\nWird Fahrzeug '+currentUser.kfz+' zugeordnet.'))return;
  await updateDoc(doc(db,'artikel',id),{status:'auto',autoKfz:currentUser.kfz});
};
window.zurueckLegen = async (id, name)=>{
  if(!confirm('"'+name+'" zurück? Status wird auf Frei gesetzt.'))return;
  await updateDoc(doc(db,'artikel',id),{status:'frei'});
};
 
// ADMIN ARTIKEL
window.artikelHinzu = async ()=>{
  const name=document.getElementById('addName').value.trim();
  const marke=document.getElementById('addMarke').value.trim();
  const art=document.getElementById('addArt').value;
  const serial=document.getElementById('addSerial').value.trim();
  const autoKfz=document.getElementById('addAuto').value;
  const status=document.getElementById('addStatus').value;
  if(!name){alert('Bitte einen Namen eingeben.');return;}
  await addDoc(collection(db,'artikel'),{name,marke:marke||'',art,serial:serial||'',emoji:selectedEmoji,autoKfz:autoKfz||'',status});
  document.getElementById('addName').value='';
  document.getElementById('addMarke').value='';
  document.getElementById('addSerial').value='';
  selectedEmoji='🔧';
  buildEmojiGrid();
  document.getElementById('emojiPreview').textContent='🔧';
};
 
window.artikelStatusAendern = async (id, val)=>{ await updateDoc(doc(db,'artikel',id),{status:val}); };
window.artikelAutoAendern   = async (id, val)=>{ await updateDoc(doc(db,'artikel',id),{autoKfz:val}); };
 
window.artikelLoeschen = async (id, btn)=>{
  const name=btn?btn.closest('.admin-item').querySelector('.admin-item-name').textContent:'?';
  if(!confirm('"'+name+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'artikel',id));
};
 
window.renderAdminArtikel = ()=>{
  const liste=document.getElementById('adminArtikelListe'); if(!liste)return;
  document.getElementById('adminArtikelCount').textContent=artikel.length;
  if(!artikel.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Artikel.</div>';return;}
  liste.innerHTML=artikel.map(a=>{
    const status=a.status||'frei';
    const autoOptions=autos.map(au=>`<option value="${au.kfz}" ${a.autoKfz===au.kfz?'selected':''}>${au.kfz}${au.desc?' – '+au.desc:''}</option>`).join('');
    return `<div class="admin-item">
      <span style="font-size:22px">${a.emoji||'🔧'}</span>
      <div class="admin-item-info">
        <div class="admin-item-name">${a.name}</div>
        <div class="admin-item-meta">${a.art}${a.marke?' · '+a.marke:''}${a.serial?' · SN: '+a.serial:''}</div>
      </div>
      <select class="status-select" onchange="artikelStatusAendern('${a.id}',this.value)">
        <option value="frei" ${status==='frei'?'selected':''}>Frei</option>
        <option value="auto" ${status==='auto'?'selected':''}>Im Auto</option>
        <option value="wartung" ${status==='wartung'?'selected':''}>Zur Wartung</option>
        <option value="defekt" ${status==='defekt'?'selected':''}>Defekt</option>
      </select>
      <select class="status-select" onchange="artikelAutoAendern('${a.id}',this.value)" style="min-width:110px">
        <option value="">– kein Auto –</option>
        ${autoOptions}
      </select>
      <button class="btn-del" onclick="artikelLoeschen('${a.id}',this)">Löschen</button>
    </div>`;
  }).join('');
};
 
// ADMIN AUTOS
window.autoHinzu = async ()=>{
  const kfz=document.getElementById('addAutoKfz').value.trim().toUpperCase();
  const desc=document.getElementById('addAutoDesc').value.trim();
  if(!kfz){alert('KFZ-Kennzeichen ist Pflichtfeld.');return;}
  await addDoc(collection(db,'autos'),{kfz,desc:desc||''});
  document.getElementById('addAutoKfz').value='';
  document.getElementById('addAutoDesc').value='';
};
window.autoLoeschen = async (id, btn)=>{
  const kfz=btn?btn.closest('.admin-item').querySelector('.admin-item-name').textContent:'?';
  if(!confirm('Auto "'+kfz+'" wirklich löschen?'))return;
  await deleteDoc(doc(db,'autos',id));
};
window.renderAdminAutos = ()=>{
  const liste=document.getElementById('adminAutoListe'); if(!liste)return;
  document.getElementById('adminAutoCount').textContent=autos.length;
  if(!autos.length){liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Autos.</div>';return;}
  liste.innerHTML=autos.map(a=>`<div class="admin-item">
    <span style="font-size:22px">🚐</span>
    <div class="admin-item-info">
      <div class="admin-item-name">${a.kfz}</div>
      <div class="admin-item-meta">${a.desc||'–'}</div>
    </div>
    <button class="btn-del" onclick="autoLoeschen('${a.id}',this)">Löschen</button>
  </div>`).join('');
};
 
function updateAutoSelects(){
  const opts='<option value="">– kein Auto –</option>'+autos.map(a=>`<option value="${a.kfz}">${a.kfz}${a.desc?' – '+a.desc:''}</option>`).join('');
  ['addAuto'].forEach(id=>{ const s=document.getElementById(id); if(s)s.innerHTML=opts; });
}
 
// ADMIN ÜBERSICHT
window.renderAdminUebersicht = ()=>{
  const div=document.getElementById('adminUebersicht'); if(!div)return;
  const stats={ frei:0, auto:0, wartung:0, defekt:0 };
  artikel.forEach(a=>{ const s=a.status||'frei'; if(stats[s]!==undefined)stats[s]++; });
 
  const kfzMap={};
  artikel.filter(a=>a.status==='auto'&&a.autoKfz).forEach(a=>{
    if(!kfzMap[a.autoKfz])kfzMap[a.autoKfz]=[];
    kfzMap[a.autoKfz].push(a);
  });
 
  let html=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
    ${Object.entries(stats).map(([s,n])=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center">
      <div style="font-size:24px;font-weight:700;color:var(--text)">${n}</div>
      <div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px">${STATUS_LABELS[s]}</div>
    </div>`).join('')}
  </div>`;
 
  if(Object.keys(kfzMap).length){
    html+=`<div class="admin-section-title" style="margin-top:20px">Verteilung nach Fahrzeug</div>`;
    html+=Object.entries(kfzMap).map(([kfz,items])=>`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px">${kfz}</span>
          <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${items.length} Artikel</span>
        </div>
        ${items.map(a=>`<div style="font-size:13px;padding:3px 0">${a.emoji||'🔧'} ${a.name} <span style="color:var(--muted);font-size:11px;font-family:var(--mono)">${a.marke?'· '+a.marke:''}</span></div>`).join('')}
      </div>`).join('');
  }
  div.innerHTML=html;
};
 
// ADMIN TABS
window.adminTab = (btn,tab)=>{
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  ['ti','ta','to'].forEach(t=>document.getElementById(t).style.display=t===tab?'block':'none');
  if(tab==='to')renderAdminUebersicht();
  if(tab==='ti'){buildEmojiGrid();}
};
 
// ENTER
document.getElementById('inputKfz').addEventListener('keydown',e=>{if(e.key==='Enter')window.monteurLogin();});
document.getElementById('inputPw').addEventListener('keydown',e=>{if(e.key==='Enter')window.adminLogin();});
</script>
</body>
</html>
