<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Werkzeug – Heesch SHK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111; --surface: #1c1c1c; --surface2: #252525;
  --border: #2e2e2e; --red: #CC0000; --red2: #991000;
  --green: #2a6e2e; --green2: #3dba44;
  --text: #f0ede8; --muted: #777;
  --sans: 'Barlow', sans-serif; --mono: 'DM Mono', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* SCREENS */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* LOGIN */
#loginScreen {
  align-items: center; justify-content: center; padding: 24px;
  background: radial-gradient(ellipse at 50% 0%, #2a0000 0%, #111 60%);
}
.login-card {
  width: 100%; max-width: 400px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 36px 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--red); margin-right: 8px; }
.login-logo h1 { font-size: 22px; font-weight: 700; display: inline; }
.login-logo p { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
.login-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; font-family: var(--mono); }
.form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 15px; font-family: var(--sans); color: var(--text); outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--red); }
.form-group input::placeholder { color: var(--muted); }
.btn-primary { width: 100%; background: var(--red); color: white; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.2s; margin-top: 6px; }
.btn-primary:hover { background: var(--red2); }
.admin-link { text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); }
.admin-link button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; text-decoration: underline; font-family: var(--sans); }
.login-error { background: #3a1010; border: 1px solid var(--red2); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: #ff8080; margin-bottom: 12px; display: none; }

/* TOPBAR */
.topbar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 20; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn-sm { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.btn-sm:hover { color: var(--text); border-color: #555; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; }
.sync-dot.live { background: var(--green2); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN LAYOUT */
#mainScreen { background: var(--bg); }
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  flex: 1;
  overflow: hidden;
}
@media (max-width: 680px) {
  .main-layout { grid-template-columns: 1fr; }
}

/* PANELS */
.panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; height: calc(100vh - 57px); }
.panel:last-child { border-right: none; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--mono); display: flex; align-items: center; gap: 8px; }
.panel-count { background: var(--surface2); border-radius: 10px; padding: 2px 8px; font-size: 10px; color: var(--muted); }
.panel-body { flex: 1; overflow-y: auto; padding: 12px; }

/* SEARCH */
.search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); outline: none; font-family: var(--sans); }
.search-input:focus { border-color: var(--red); }
.search-input::placeholder { color: var(--muted); }

/* WERKZEUG KARTE (Lager) */
.wz-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.15s; cursor: pointer;
}
.wz-card:hover { border-color: #3a3a3a; background: var(--surface2); transform: translateY(-1px); }
.wz-card:active { transform: scale(0.99); }
.wz-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.wz-info { flex: 1; min-width: 0; }
.wz-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wz-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.wz-kat { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.wz-btn { background: var(--red); color: white; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0; font-family: var(--sans); white-space: nowrap; transition: background 0.15s; }
.wz-btn:hover { background: var(--red2); }
.wz-btn.gruen { background: var(--green); }
.wz-btn.gruen:hover { background: #1e5522; }

/* KFZ BEREICH */
.kfz-section { margin-bottom: 16px; }
.kfz-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 6px;
}
.kfz-plate {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px; color: var(--text);
  letter-spacing: 0.06em;
}
.kfz-monteur { font-size: 13px; font-weight: 600; flex: 1; }
.kfz-anzahl { font-size: 11px; font-family: var(--mono); color: var(--muted); }

.kfz-werkzeug {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-radius: 8px; margin-bottom: 4px;
  background: #0d1f0e; border: 1px solid var(--green);
}
.kfz-wz-name { font-size: 13px; flex: 1; }
.kfz-wz-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.btn-zurueck { background: transparent; border: 1px solid #3a1010; color: #cc4444; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; white-space: nowrap; }
.btn-zurueck:hover { background: #3a1010; }

.empty-panel { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; }
.empty-panel .ei { font-size: 36px; margin-bottom: 10px; }

/* KATEGORIE LABEL */
.kat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--mono); padding: 8px 4px 4px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 360px; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; }
.btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; font-family: var(--sans); }

/* ADMIN */
#adminScreen { background: var(--bg); }
.admin-body { padding: 20px; max-width: 600px; margin: 0 auto; }
.admin-section { margin-bottom: 28px; }
.admin-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: var(--mono); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.form-row .form-group { flex: 1; min-width: 130px; margin-bottom: 0; }
.btn-add { background: var(--green); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.2s; }
.btn-add:hover { background: #1e5522; }
.admin-wz-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 6px; }
.admin-wz-info { flex: 1; }
.admin-wz-name { font-size: 13px; font-weight: 600; }
.admin-wz-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.btn-del { background: transparent; border: 1px solid #3a1010; color: #cc4444; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.btn-del:hover { background: #3a1010; }
.admin-tabs { display: flex; gap: 4px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
.admin-tab { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; color: var(--muted); background: transparent; transition: all 0.2s; font-family: var(--sans); }
.admin-tab.active { background: var(--surface2); border-color: var(--border); color: var(--text); }

/* USER TAG */
.user-tag { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: var(--mono); padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div><span class="dot"></span><h1>Heesch SHK</h1></div>
      <p>WERKZEUGVERWALTUNG</p>
    </div>
    <div id="loginError" class="login-error"></div>
    <div id="monteurForm">
      <div class="login-title">Monteur anmelden</div>
      <div class="form-group">
        <label>Vollständiger Name</label>
        <input type="text" id="inputName" placeholder="z.B. Klaus Müller" autocomplete="off">
      </div>
      <div class="form-group">
        <label>KFZ-Kennzeichen</label>
        <input type="text" id="inputKfz" placeholder="z.B. IZ-KL 123" style="text-transform:uppercase" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="monteurLogin()">Anmelden</button>
      <div class="admin-link"><button onclick="showAdmin()">Admin-Bereich</button></div>
    </div>
    <div id="adminForm" style="display:none">
      <div class="login-title">Admin-Anmeldung</div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="inputPw" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="adminLogin()">Einloggen</button>
      <div class="admin-link"><button onclick="showMonteur()">← Zurück</button></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <span class="topbar-title">Werkzeugverwaltung</span>
    </div>
    <div class="topbar-right">
      <span id="syncDot" class="sync-dot"></span>
      <div class="user-tag" id="userTag">–</div>
      <button class="btn-sm" onclick="abmelden()">Abmelden</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- LINKES PANEL: LAGER -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          🏭 Lager – Verfügbar
          <span class="panel-count" id="lagerCount">0</span>
        </span>
      </div>
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchLager" placeholder="Werkzeug suchen..." oninput="renderLager()">
      </div>
      <div class="panel-body" id="lagerPanel">
        <div class="empty-panel"><div class="ei">⏳</div>Lade...</div>
      </div>
    </div>

    <!-- RECHTES PANEL: KFZ -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          🚐 Im Fahrzeug / Baustelle
          <span class="panel-count" id="kfzCount">0</span>
        </span>
      </div>
      <div class="panel-body" id="kfzPanel">
        <div class="empty-panel"><div class="ei">⏳</div>Lade...</div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <span class="topbar-title">Admin – Werkzeugverwaltung</span>
    </div>
    <div class="topbar-right">
      <span id="syncDotAdmin" class="sync-dot"></span>
      <button class="btn-sm" onclick="adminAbmelden()">Abmelden</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="adminTab(this,'tw')">Werkzeuge</button>
    <button class="admin-tab" onclick="adminTab(this,'tm')">Übersicht</button>
  </div>
  <div class="admin-body">
    <div id="tw">
      <div class="admin-section">
        <div class="admin-section-title">Werkzeug hinzufügen</div>
        <div class="add-form">
          <div class="form-row">
            <div class="form-group"><label>Name</label><input type="text" id="addName" placeholder="z.B. Schlagbohrmaschine"></div>
            <div class="form-group"><label>Kategorie</label><input type="text" id="addKat" placeholder="z.B. Elektrowerkzeug"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Seriennummer</label><input type="text" id="addSerial" placeholder="z.B. SN-2024-001"></div>
            <div class="form-group"><label>Symbol (Emoji)</label><input type="text" id="addEmoji" placeholder="🔧" maxlength="2"></div>
          </div>
          <button class="btn-add" onclick="wzHinzu()">+ Hinzufügen</button>
        </div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">Alle Werkzeuge (<span id="adminCount">0</span>)</div>
        <div id="adminListe"></div>
      </div>
    </div>
    <div id="tm" style="display:none">
      <div class="admin-section">
        <div class="admin-section-title">Aktuelle Verteilung</div>
        <div id="adminUebersicht"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary" style="flex:1;margin-top:0" id="modalConfirm">Bestätigen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyByjMOVQ12Grua48QwGGvvnB4lze-isyv0",
  authDomain: "shk-todo-da35b.firebaseapp.com",
  projectId: "shk-todo-da35b",
  storageBucket: "shk-todo-da35b.firebasestorage.app",
  messagingSenderId: "978821411452",
  appId: "1:978821411452:web:3a295d420ad277130d4ff9"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const ADMIN_PW = "Heesch2000!";

let werkzeuge = [];   // alle Werkzeuge
let auswahlen = {};   // { wzId: { name, kfz } }
let currentUser = null;
let isAdmin = false;

// SYNC
function sync(dot) {
  const d = document.getElementById(dot);
  if (d) { d.className = 'sync-dot live'; }
}

// LISTENER
const qWZ = query(collection(db, 'werkzeuge'), orderBy('kategorie'), orderBy('name'));
onSnapshot(qWZ, snap => {
  werkzeuge = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  sync('syncDot'); sync('syncDotAdmin');
  renderLager(); renderKfz();
  renderAdminListe(); renderAdminUebersicht();
});

onSnapshot(collection(db, 'auswahlen'), snap => {
  auswahlen = {};
  snap.docs.forEach(d => { auswahlen[d.id] = d.data(); });
  renderLager(); renderKfz();
  renderAdminUebersicht();
});

// LOGIN
window.showAdmin   = () => { document.getElementById('monteurForm').style.display='none'; document.getElementById('adminForm').style.display='block'; err(''); };
window.showMonteur = () => { document.getElementById('adminForm').style.display='none'; document.getElementById('monteurForm').style.display='block'; err(''); };

window.monteurLogin = () => {
  const name = document.getElementById('inputName').value.trim();
  const kfz  = document.getElementById('inputKfz').value.trim().toUpperCase();
  if (!name) { err('Bitte Namen eingeben.'); return; }
  if (!kfz)  { err('Bitte KFZ-Kennzeichen eingeben.'); return; }
  currentUser = { name, kfz }; isAdmin = false;
  document.getElementById('userTag').textContent = name + ' · ' + kfz;
  showScreen('mainScreen');
};

window.adminLogin = () => {
  if (document.getElementById('inputPw').value !== ADMIN_PW) { err('Falsches Passwort.'); return; }
  isAdmin = true; currentUser = null;
  showScreen('adminScreen');
};

window.abmelden = () => { currentUser = null; showScreen('loginScreen'); document.getElementById('inputName').value=''; document.getElementById('inputKfz').value=''; };
window.adminAbmelden = () => { isAdmin = false; document.getElementById('inputPw').value=''; showScreen('loginScreen'); };

function err(msg) {
  const e = document.getElementById('loginError');
  e.textContent = msg; e.style.display = msg ? 'block' : 'none';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// RENDER LAGER
window.renderLager = () => {
  const panel = document.getElementById('lagerPanel');
  const search = (document.getElementById('searchLager')?.value || '').toLowerCase();

  const freie = werkzeuge.filter(w => !auswahlen[w.id] &&
    (!search || w.name.toLowerCase().includes(search) || w.kategorie.toLowerCase().includes(search) || (w.serial||'').toLowerCase().includes(search))
  );

  document.getElementById('lagerCount').textContent = freie.length;

  if (freie.length === 0) {
    panel.innerHTML = `<div class="empty-panel"><div class="ei">✅</div>Alle Werkzeuge sind vergeben</div>`;
    return;
  }

  // Gruppieren
  const gruppen = {};
  freie.forEach(w => { if (!gruppen[w.kategorie]) gruppen[w.kategorie]=[]; gruppen[w.kategorie].push(w); });

  panel.innerHTML = Object.entries(gruppen).map(([kat, items]) => `
    <div class="kat-label">${kat}</div>
    ${items.map(w => `
      <div class="wz-card" onclick="mitnehmen('${w.id}')">
        <div class="wz-icon">${w.emoji || '🔧'}</div>
        <div class="wz-info">
          <div class="wz-name">${w.name}</div>
          <div class="wz-meta">${w.serial ? 'SN: '+w.serial : '–'}</div>
        </div>
        <button class="wz-btn" onclick="event.stopPropagation();mitnehmen('${w.id}')">Mitnehmen →</button>
      </div>
    `).join('')}
  `).join('');
};

// RENDER KFZ
window.renderKfz = () => {
  const panel = document.getElementById('kfzPanel');
  const total = Object.keys(auswahlen).length;
  document.getElementById('kfzCount').textContent = total;

  if (total === 0) {
    panel.innerHTML = `<div class="empty-panel"><div class="ei">🔧</div>Noch kein Werkzeug vergeben</div>`;
    return;
  }

  // Gruppieren nach KFZ
  const kfzMap = {};
  Object.entries(auswahlen).forEach(([wzId, data]) => {
    const key = data.kfz + '||' + data.name;
    if (!kfzMap[key]) kfzMap[key] = { name: data.name, kfz: data.kfz, items: [] };
    const wz = werkzeuge.find(w => w.id === wzId);
    if (wz) kfzMap[key].items.push({ ...wz, wzId });
  });

  // Eigenes KFZ zuerst
  const sorted = Object.values(kfzMap).sort((a, b) => {
    if (currentUser && a.kfz === currentUser.kfz) return -1;
    if (currentUser && b.kfz === currentUser.kfz) return 1;
    return a.kfz.localeCompare(b.kfz);
  });

  panel.innerHTML = sorted.map(kfz => {
    const istMeins = currentUser && kfz.kfz === currentUser.kfz && kfz.name === currentUser.name;
    return `
    <div class="kfz-section">
      <div class="kfz-header">
        <span class="kfz-plate">${kfz.kfz}</span>
        <span class="kfz-monteur">${kfz.name}${istMeins ? ' <span style="font-size:10px;color:var(--green2)">(Ich)</span>' : ''}</span>
        <span class="kfz-anzahl">${kfz.items.length} Werkzeug${kfz.items.length!==1?'e':''}</span>
      </div>
      ${kfz.items.map(w => `
        <div class="kfz-werkzeug">
          <span style="font-size:16px">${w.emoji||'🔧'}</span>
          <div style="flex:1;min-width:0">
            <div class="kfz-wz-name">${w.name}</div>
            <div class="kfz-wz-meta">${w.serial ? 'SN: '+w.serial : '–'} · ${w.kategorie}</div>
          </div>
          ${istMeins ? `<button class="btn-zurueck" onclick="zurueckLegen('${w.wzId}','${w.name}')">← Zurück</button>` : ''}
        </div>
      `).join('')}
    </div>`;
  }).join('');
};

// MITNEHMEN
window.mitnehmen = (wzId) => {
  if (!currentUser) return;
  const wz = werkzeuge.find(w => w.id === wzId);
  if (!wz) return;
  showModal(
    `"${wz.name}" mitnehmen?`,
    `Das Werkzeug wird deinem Fahrzeug ${currentUser.kfz} zugeordnet.`,
    async () => {
      await setDoc(doc(db, 'auswahlen', wzId), { name: currentUser.name, kfz: currentUser.kfz, ts: new Date().toISOString() });
    }
  );
};

// ZURÜCK
window.zurueckLegen = (wzId, wzName) => {
  showModal(
    `"${wzName}" zurücklegen?`,
    `Das Werkzeug kommt zurück ins Lager.`,
    async () => { await deleteDoc(doc(db, 'auswahlen', wzId)); }
  );
};

// ADMIN
window.wzHinzu = async () => {
  const name  = document.getElementById('addName').value.trim();
  const kat   = document.getElementById('addKat').value.trim();
  const serial= document.getElementById('addSerial').value.trim();
  const emoji = document.getElementById('addEmoji').value.trim() || '🔧';
  if (!name||!kat) { alert('Name und Kategorie sind Pflichtfelder.'); return; }
  await addDoc(collection(db, 'werkzeuge'), { name, kategorie: kat, serial: serial||'', emoji });
  document.getElementById('addName').value='';
  document.getElementById('addSerial').value='';
  document.getElementById('addEmoji').value='';
};

window.wzLoeschenBtn = (btn) => {
  const id   = btn.getAttribute('data-id');
  const item = btn.closest('.admin-wz-item');
  const name = item.querySelector('.admin-wz-name').textContent;
  window.wzLoeschen(id, name);
};

window.wzLoeschen = async (id, name) => {
  showModal(`"${name}" löschen?`, 'Das Werkzeug wird dauerhaft entfernt.', async () => {
    await deleteDoc(doc(db, 'werkzeuge', id));
    await deleteDoc(doc(db, 'auswahlen', id)).catch(()=>{});
  });
};

window.renderAdminListe = () => {
  const liste = document.getElementById('adminListe');
  if (!liste) return;
  document.getElementById('adminCount').textContent = werkzeuge.length;
  if (!werkzeuge.length) { liste.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Werkzeuge.</div>'; return; }
  liste.innerHTML = werkzeuge.map(w => `
    <div class="admin-wz-item">
      <span style="font-size:20px">${w.emoji||'🔧'}</span>
      <div class="admin-wz-info">
        <div class="admin-wz-name">${w.name}</div>
        <div class="admin-wz-meta">${w.kategorie}${w.serial?' · SN: '+w.serial:''}</div>
      </div>
      ${auswahlen[w.id]?`<span style="font-size:11px;color:#ff8080;font-family:var(--mono)">${auswahlen[w.id].kfz}</span>`:''}
      <button class="btn-del" onclick="wzLoeschen('${w.id}','${w.name}')">Löschen</button>
    </div>
  `).join('');
};

window.renderAdminUebersicht = () => {
  const div = document.getElementById('adminUebersicht');
  if (!div) return;
  const kfzMap = {};
  const frei = werkzeuge.filter(w => !auswahlen[w.id]);

  Object.entries(auswahlen).forEach(([wzId, data]) => {
    const key = data.kfz+'||'+data.name;
    if (!kfzMap[key]) kfzMap[key] = { name: data.name, kfz: data.kfz, items: [] };
    const wz = werkzeuge.find(w => w.id === wzId);
    if (wz) kfzMap[key].items.push(wz);
  });

  let html = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;color:var(--muted);font-family:var(--mono);margin-bottom:8px">🏭 LAGER – FREI (${frei.length})</div>
    ${frei.length ? frei.map(w=>`<div style="font-size:13px;padding:3px 0;color:var(--muted)">${w.emoji||'🔧'} ${w.name}</div>`).join('') : '<div style="font-size:12px;color:var(--muted)">Alle vergeben</div>'}
  </div>`;

  html += Object.values(kfzMap).map(k => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-family:var(--mono);font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px">${k.kfz}</span>
        <span style="font-size:13px;font-weight:600">${k.name}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)">${k.items.length} Werkzeug${k.items.length!==1?'e':''}</span>
      </div>
      ${k.items.map(w=>`<div style="font-size:13px;padding:3px 0">${w.emoji||'🔧'} ${w.name} <span style="color:var(--muted);font-family:var(--mono);font-size:11px">${w.serial?'SN:'+w.serial:''}</span></div>`).join('')}
    </div>
  `).join('');

  div.innerHTML = html;
};

window.adminTab = (btn, tab) => {
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tw').style.display = tab==='tw'?'block':'none';
  document.getElementById('tm').style.display = tab==='tm'?'block':'none';
  if (tab==='tm') renderAdminUebersicht();
};

// MODAL
let modalAction = null;
function showModal(title, text, action) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent  = text;
  modalAction = action;
  document.getElementById('modal').classList.add('open');
}
window.closeModal = () => { document.getElementById('modal').classList.remove('open'); modalAction = null; };
document.getElementById('modalConfirm').onclick = async () => { closeModal(); if (modalAction) await modalAction(); };

// ENTER
document.getElementById('inputKfz').addEventListener('keydown', e => { if (e.key==='Enter') window.monteurLogin(); });
document.getElementById('inputPw').addEventListener('keydown',  e => { if (e.key==='Enter') window.adminLogin(); });
</script>
</body>
</html>
